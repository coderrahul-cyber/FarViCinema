# nginx/nginx.dev.conf
#
# Development NGINX config.
#
# Differences from production nginx.conf:
#   1. Single upstream — just host.docker.internal:8080 (your local Bun ws-server)
#      No second node, no ip_hash (only one server).
#   2. Also proxies mediasoup health at /mediasoup-health for easy testing.
#   3. Also proxies frontend at /  when Next.js is running on port 3001.
#   4. Rate limiting kept at lower threshold for dev.
#   5. ssl_stapling off (mkcert certs don't have OCSP endpoint).
#
# Traffic flow in dev:
#   Browser → wss://localhost → NGINX:443 → ws://host.docker.internal:8080 (Bun)
#   Browser → https://localhost → NGINX:443 → http://host.docker.internal:3001 (Next.js)

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format dev '$remote_addr "$request" $status upstream=$upstream_addr';
    access_log /var/log/nginx/access.log dev;
    error_log  /var/log/nginx/error.log  info;   # info level for dev debugging

    sendfile    on;
    tcp_nodelay on;
    keepalive_timeout 65;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Upstream: your local Bun ws-server ────────────────────────────────────
    upstream ws_server {
        server host.docker.internal:8080;
        keepalive 16;
    }

    # ── Upstream: your local Next.js frontend ─────────────────────────────────
    upstream frontend {
        server host.docker.internal:3001;
        keepalive 8;
    }

    # ── Upstream: your local mediasoup REST server ────────────────────────────
    # mediasoup runs HTTPS itself, so we skip_verify
    upstream mediasoup {
        server host.docker.internal:3000;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS + WSS server ───────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:1m;
        ssl_session_timeout 10m;

        # ssl_stapling off for mkcert local certs (no OCSP responder)

        # ── WebSocket → Bun ws-server ──────────────────────────────────────────
        # Bun listens on ws://localhost:8080/
        # Clients connect to wss://localhost/?token=JWT
        location /ws {
            proxy_pass         http://ws_server/;
            proxy_http_version 1.1;

            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_set_header X-Forwarded-Proto https;

            proxy_read_timeout    3600s;
            proxy_send_timeout    3600s;
            proxy_connect_timeout 5s;
            proxy_buffering       off;
        }

        # ── Frontend (Next.js on port 3001) ───────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-Proto https;
            # Next.js HMR websocket
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
        }

        # ── NGINX health check ─────────────────────────────────────────────────
        location /nginx-health {
            access_log off;
            return 200 '{"status":"ok","service":"nginx-dev"}';
            add_header Content-Type application/json;
        }

        # ── WS server health (proxied) ─────────────────────────────────────────
        location /ws-health {
            proxy_pass http://ws_server/health;
        }
    }
}