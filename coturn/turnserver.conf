# coturn/turnserver.conf
#
# TURN = Traversal Using Relays around NAT
#
# What coturn does and why you need it:
#   WebRTC tries to connect peers directly (P2P). This works ~85% of the time.
#   The other ~15% is users behind:
#     - Symmetric NAT (most corporate networks, some mobile carriers)
#     - Firewalls that block UDP entirely
#     - Double NAT (home router behind ISP router)
#
#   For these users, WebRTC falls back to a TURN relay: all media flows
#   through your coturn server instead of peer-to-peer. The user connects
#   to coturn, and coturn connects to mediasoup on their behalf.
#
#   Without TURN: those 15% see a black screen with no error message.
#   With TURN: every user connects successfully.
#
# How credentials work (use-auth-secret mode):
#   - NO static username/password (that would be insecure — anyone could use your relay)
#   - Instead: time-limited HMAC-SHA1 credentials
#   - mediasoup-server generates credentials on each transport creation:
#       username = "{unix_expiry_timestamp}:{socketId}"
#       password = HMAC-SHA1(username, TURN_SECRET)
#   - coturn independently verifies the HMAC using the same shared TURN_SECRET
#   - Credentials expire automatically (24h by default)
#   - If TURN_SECRET leaks: rotate it in both coturn.conf and .env — old credentials expire
#
# Security rules applied below:
#   - Deny relaying to private IP ranges (prevents SSRF attacks)
#   - Quota limits per user and total
#   - Bandwidth cap per allocation

# ── Listening addresses ───────────────────────────────────────────────────────

# Your server's public IP — MUST be the real internet-facing IP
# coturn cannot be behind NAT itself (it's the NAT escape route)
# Replace with your actual public IP address
external-ip=192.168.31.99

# Primary port for STUN + TURN (both TCP and UDP)
listening-port=3478

# TURN over TLS (TURNS) — for clients behind firewalls that block UDP entirely
# Some corporate firewalls only allow TCP port 443, so we also add port 443 below
tls-listening-port=5349

# Some very strict firewalls only allow port 443
# Uncomment if your users are behind such firewalls:
# alt-listening-port=80
# alt-tls-listening-port=443

# ── Relay port range ─────────────────────────────────────────────────────────
# coturn allocates one UDP port per TURN allocation from this range.
# Must be open in your server's firewall (both UDP and TCP, inbound + outbound).
# 49152-65535 is the IANA ephemeral port range — safe to use for TURN.
min-port=49152
max-port=65535

# ── Authentication ────────────────────────────────────────────────────────────
# HMAC-SHA1 time-limited credentials — much more secure than static passwords.
# The secret below MUST match TURN_SECRET in your .env file.
use-auth-secret
static-auth-secret="hirahulsinghsmant9012"

# ── Realm ─────────────────────────────────────────────────────────────────────
# Used in TURN authentication. Set to your domain.
realm=yourdomain.com

# ── TLS certificates ──────────────────────────────────────────────────────────
# Same cert as NGINX. For local dev: mkcert (see scripts/gen-certs.sh)
# For production: Let's Encrypt cert for your domain
cert=/etc/coturn/ssl/cert.pem
pkey=/etc/coturn/ssl/key.pem

# ── Security: block relaying to private networks ──────────────────────────────
# This prevents an attacker from using your TURN server to probe your
# internal network (SSRF via TURN relay).
# Block loopback
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=::1
# Block private ranges (RFC 1918)
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
# Block link-local
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=fe80::-febf:ffff:ffff:ffff:ffff:ffff:ffff:ffff
# Block unspecified
denied-peer-ip=0.0.0.0-0.255.255.255

# ── Quotas and bandwidth ──────────────────────────────────────────────────────
# Max simultaneous TURN allocations per user credential
user-quota=50

# Max total TURN allocations across all users on this server
total-quota=500

# Max bandwidth per allocation in bytes/second (1 MB/s per user)
# This prevents one user from consuming all your bandwidth
max-bps=1048576

# ── Logging ───────────────────────────────────────────────────────────────────
log-file=/var/log/coturn/turnserver.log
simple-log
# Verbose logging for debugging (comment out in production):
# verbose

# ── Protocol settings ─────────────────────────────────────────────────────────
# Add fingerprints to TURN messages (required by some WebRTC clients)
fingerprint

# Drop old TLS versions (security)
no-tlsv1
no-tlsv1_1

# ── Misc ──────────────────────────────────────────────────────────────────────
# Don't run as daemon (Docker handles process management)
# daemon

# Stale nonce timeout (seconds) — how often credentials must be refreshed
stale-nonce=600

# How long an idle TURN allocation lives before being closed (seconds)
# Should be >= your ICE timeout
lifetime=600