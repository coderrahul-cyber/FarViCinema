

services:
  minio:
    container_name: "s3-bucket"
    image: minio/minio:latest
    ports: 
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ../../minio-data:/data
    healthcheck:
      test: ["CMD", "curl" , "-f" , "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    
  
  # One-shot init container: creates buckets once MinIO is healthy,
  # then exits. Re-running `docker compose up` is safe — `mc mb`
  # is a no-op if the bucket already exists (--ignore-existing).
  minio-init:
    image: minio/mc:latest
    container_name: video-pipeline-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/raw-uploads &&
      mc mb --ignore-existing local/hls-output &&
      echo 'Buckets ready: raw-uploads, hls-output'
      "
 
volumes:
  minio-data:
 