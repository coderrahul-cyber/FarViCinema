
services:

  redis:
    image: redis:7.2-alpine
    container_name: videocall-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-videocall_secret}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - ../../redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-videocall_secret}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Web UI to inspect Redis keys visually — open http://localhost:8081
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: videocall-redis-ui
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOSTS=local:redis:6379:0:${REDIS_PASSWORD:-videocall_secret}
      - HTTP_USER=admin
      - HTTP_PASSWORD=admin
    ports:
      - "8081:8081"

volumes:
  redis_data: