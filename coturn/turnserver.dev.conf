# coturn/turnserver.dev.conf
#
# Development coturn configuration.
# Simpler than production — no TLS required for LAN testing.
#
# For LOCAL DEV:
#   - Set external-ip to your LAN IP (e.g. 192.168.1.37)
#   - TURN will work for devices on the same WiFi/LAN
#   - Won't work over internet (no public IP) — that's fine for dev
#
# Find your LAN IP:
#   macOS/Linux:  hostname -I | awk '{print $1}'
#                 or: ip addr show | grep 'inet ' | grep -v 127
#   Windows:      ipconfig | findstr "IPv4"
#
# Replace LAN_IP_HERE below with your actual LAN IP.

# ── Network ───────────────────────────────────────────────────────────────────
external-ip=172.20.192.1

listening-port=3478
# No TLS port for dev — plain TURN over UDP/TCP is enough
# tls-listening-port=5349

# Relay port range (must be open in your OS firewall too)
min-port=49152
max-port=65535

# ── Auth ──────────────────────────────────────────────────────────────────────
use-auth-secret
# Must match TURN_SECRET in your .env files
static-auth-secret="hirahulsinghsmant9012"

realm=localhost

# ── No TLS in dev ─────────────────────────────────────────────────────────────
# Comment out cert/pkey for plain dev (no TLS TURN needed locally)
# cert=/etc/coturn/ssl/cert.pem
# pkey=/etc/coturn/ssl/key.pem

# ── Security ──────────────────────────────────────────────────────────────────
# Keep private IP blocks even in dev
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=::1

# NOTE: In dev you might want to ALLOW your LAN range so mediasoup is reachable
# Comment the line below if mediasoup and coturn are on same LAN
# denied-peer-ip=192.168.0.0-192.168.255.255

# ── Logging — verbose for dev ─────────────────────────────────────────────────
log-file=stdout
verbose
simple-log

# ── Misc ──────────────────────────────────────────────────────────────────────
fingerprint
stale-nonce=3600
lifetime=3600
user-quota=100
total-quota=1000