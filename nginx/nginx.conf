# nginx/nginx.conf
#
# NGINX is the single entry point for ALL external traffic.
#
# What it does:
#   1. Terminates SSL — browsers connect wss:// and https://
#      NGINX decrypts and forwards plain ws:// / http:// internally
#   2. Proxies WebSocket connections to ws-server nodes
#   3. Sticky sessions — ip_hash so a user always hits the same ws-server
#      (needed because WebSocket connections are stateful to a node)
#   4. Serves the Next.js frontend via reverse proxy
#   5. Redirects HTTP → HTTPS
#
# Port layout (what's exposed to the internet):
#   80   → HTTP (redirects to 443)
#   443  → HTTPS + WSS  (all client traffic)
#
# Internal Docker network only (never directly exposed):
#   ws-node-1:8080   ws-node-2:8080   (Bun WS servers)
#   frontend:3001                      (Next.js)
#   mediasoup:3000                     (mediasoup REST — called by ws-server, not browser)
#
# Why ip_hash for sticky sessions?
#   WebSocket connections are long-lived. If NGINX routes the initial HTTP
#   upgrade to node-1, all subsequent messages on that WS connection go to
#   node-1. ip_hash ensures the SAME client IP always goes to the SAME node.
#   Phase 3 Redis pub/sub handles cross-node messaging for when node-2 needs
#   to notify clients on node-1 — NGINX just handles the initial routing.

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr [$time_local] "$request" '
                    '$status $body_bytes_sent '
                    'rt=$request_time uct=$upstream_connect_time '
                    'node=$upstream_addr';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    client_max_body_size 2m;

    gzip            on;
    gzip_comp_level 4;
    gzip_types      text/plain text/css application/json
                    application/javascript text/xml;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # Limit new WebSocket connections to 10 per second per IP
    # burst=20 allows short spikes, nodelay serves them immediately
    limit_req_zone  $binary_remote_addr zone=ws_conn:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ── WebSocket header mapping ──────────────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── WS server upstream — sticky by client IP ──────────────────────────────
    # ip_hash: same client IP → same backend node every time.
    # This is critical for WebSocket: the HTTP upgrade handshake and all
    # subsequent WS frames must reach the same Bun process.
    #
    # Adding a second node later: just add another 'server' line here.
    # Phase 3 Redis pub/sub ensures cross-node events still work.
    upstream ws_nodes {
        ip_hash;
        server ws-node-1:8080;            # primary node
        server ws-node-2:8080 backup;     # backup — promoted if node-1 is down
        keepalive 64;                      # reuse backend connections
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen      80;
        server_name _;
        return 301  https://$host$request_uri;
    }

    # ── Main HTTPS server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name localhost;   # ← change to your domain in production

        # SSL certificates
        # For local dev: generated by mkcert (see scripts/gen-certs.sh)
        # For production: Let's Encrypt (certbot)
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # Modern TLS — drops TLS 1.0 and 1.1 (not supported by modern browsers anyway)
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;
        ssl_stapling              on;
        ssl_stapling_verify       on;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000" always;
        add_header X-Frame-Options           DENY;
        add_header X-Content-Type-Options    nosniff;

        # ── WebSocket upgrade — path: /  ──────────────────────────────────────
        # The Bun ws-server listens on ws://node:8080/ (root path).
        # Clients connect to wss://yourdomain.com/?token=JWT
        # NGINX proxies this to the upstream ws_nodes pool.
        #
        # Key headers:
        #   Upgrade + Connection  → tells upstream this is a WebSocket
        #   X-Real-IP             → ws-server sees the real client IP
        #   X-Node-Id             → lets ws-server know which NGINX it came from
        location / {
            # Apply rate limit only to new connections (not established WS frames)
            limit_req zone=ws_conn burst=20 nodelay;

            # Check if this is actually a WebSocket upgrade request
            # If not (e.g. healthcheck), still proxy but without upgrade
            proxy_pass         http://ws_nodes;
            proxy_http_version 1.1;

            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host       $host;

            # Pass real client information downstream
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket connections are long-lived — increase timeouts
            # 1 hour matches the socket TTL in Redis
            proxy_read_timeout    3600s;
            proxy_send_timeout    3600s;
            proxy_connect_timeout 10s;

            # Don't buffer WS frames — send them immediately
            proxy_buffering off;
        }

        # ── Frontend (Next.js) — path: /app ───────────────────────────────────
        # If you want to serve the frontend through NGINX too:
        location /app/ {
            proxy_pass         http://frontend:3001/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Next.js HMR websocket (dev only)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # ── NGINX health check (public, no auth) ──────────────────────────────
        location /nginx-health {
            access_log off;
            return 200 '{"status":"ok","service":"nginx"}';
            add_header Content-Type application/json;
        }
    }
}