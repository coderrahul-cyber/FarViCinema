
services:
  linux:
    container_name: "ubuntu"
    build:
      context: ../image/
      dockerfile: Dockerfile.linux
    restart: unless-stopped
    tty: true
    ports:
      - "2000-2200:2000-2200"
      - "3000:3000"
    volumes:
      - "../../apps/sfu-server:/usr/src"
    
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: sfu_db
  
  db:
    container_name: "db"
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sfu_db
    ports:
      - "5432:5432"
    volumes:
      - ../../db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s


      
